const QUIZ_DATA = [

function Btn({ variant='primary', size, onClick, children, disabled, style={} }) {
  const colors = { primary:{bg:'#0F1F45',color:'#fff'}, danger:{bg:'#E03028',color:'#fff'}, outline:{bg:'#fff',color:'#0F1F45',border:'1.5px solid rgba(15,31,69,.2)'} };
  const c = colors[variant] || colors.primary;
  return (
    <button onClick={onClick} disabled={disabled}
      style={{...S.btn(size), background:disabled?'#ccc':c.bg, color:disabled?'#888':c.color, border:c.border||'none', opacity:disabled?.7:1, ...style}}>

/* ═══════════ CALCULATEUR AMORT ═══════════ */
function AmortCalc() {
  const [val, setVal] = useState(60000);
  const [dur, setDur] = useState(5);
  const [rows, setRows] = useState([]);
  const calc = () => {
    const dot = val / dur;
    setRows(Array.from({length:dur}, (_,i) => ({
      ex: i===0 ? 'N' : `N+${i}`,
      dot: dot,
      cum: dot*(i+1),
      vnc: Math.max(0, val - dot*(i+1))
    })));
  };
  const fmt = n => n.toLocaleString('fr-FR') + ' €';
  return (
    <div>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'.6rem', marginBottom:'.8rem'}}>
        {[['Valeur d\'origine (€)', val, setVal], ['Durée de vie (ans)', dur, setDur]].map(([lbl,v,fn],i) => (
          <div key={i}>
            <label style={{fontSize:'.74rem',color:'#6B7490',display:'block',marginBottom:'.22rem'}}>{lbl}</label>
            <input type="number" value={v} min="1" max={i?30:undefined}
              onChange={e=>fn(Number(e.target.value))}
              style={{width:'100%',padding:'.43rem .68rem',border:'1.5px solid rgba(15,31,69,.12)',borderRadius:8,fontSize:'.87rem'}}/>
          </div>
        ))}
      </div>
      <Btn onClick={calc} size="sm">Calculer</Btn>
      {rows.length > 0 && (
        <div style={{marginTop:'.85rem',overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.8rem'}}>
            <thead><tr style={{background:'#F0EEE8'}}>
              {['Exercice','Dotation','Amort. cumulé','VNC'].map(h=><th key={h} style={{padding:'.4rem .55rem',textAlign:'center',fontWeight:600,border:'1px solid rgba(15,31,69,.1)',fontSize:'.74rem'}}>{h}</th>)}
            </tr></thead>
            <tbody>{rows.map((r,i)=>(
              <tr key={i} style={{background:i%2?'#fafafa':'#fff'}}>
                <td style={{padding:'.38rem .55rem',textAlign:'center',border:'1px solid #eee'}}>{r.ex}</td>
                <td style={{padding:'.38rem .55rem',textAlign:'center',border:'1px solid #eee'}}>{fmt(r.dot)}</td>
                <td style={{padding:'.38rem .55rem',textAlign:'center',border:'1px solid #eee'}}>{fmt(r.cum)}</td>
                <td style={{padding:'.38rem .55rem',textAlign:'center',border:'1px solid #eee',fontWeight:600}}>{fmt(r.vnc)}</td>
              </tr>
            ))}</tbody>
          </table>
          <p style={{fontSize:'.77rem',color:'#6B7490',marginTop:'.45rem'}}>Dotation annuelle : <strong>{fmt(val/dur)}</strong></p>
        </div>
      )}
    </div>
  );
}

/* ═══════════ CALCULATEUR FRNG ═══════════ */
function FRNGCalc() {
  const [v, setV] = useState({cp:500000,emp:200000,immo:550000,st:80000,cr:60000,det:40000});
  const [res, setRes] = useState(null);
  const fields = [['Capitaux Propres (€)','cp'],['Emprunt LT (€)','emp'],['Actif Immobilisé net (€)','immo'],['Stocks (€)','st'],['Créances clients (€)','cr'],['Dettes fournisseurs (€)','det']];
  const calc = () => {
    const frng = (v.cp+v.emp)-v.immo, bfr = v.st+v.cr-v.det, tn = frng-bfr;
    setRes({frng,bfr,tn});
  };
  const fmt = n => (n>=0?'+':'')+n.toLocaleString('fr-FR')+' €';
  const col = n => n>=0 ? '#1e6e45' : '#c41f1f';
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.6rem',marginBottom:'.8rem'}}>
        {fields.map(([lbl,k]) => (
          <div key={k}>
            <label style={{fontSize:'.74rem',color:'#6B7490',display:'block',marginBottom:'.22rem'}}>{lbl}</label>
            <input type="number" value={v[k]} min="0"
              onChange={e=>setV(prev=>({...prev,[k]:Number(e.target.value)}))}
              style={{width:'100%',padding:'.43rem .68rem',border:'1.5px solid rgba(15,31,69,.12)',borderRadius:8,fontSize:'.87rem'}}/>
          </div>
        ))}
      </div>
      <Btn onClick={calc} size="sm">Calculer</Btn>
      {res && (
        <div style={{marginTop:'.85rem'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.6rem',marginBottom:'.65rem'}}>
            {[['FRNG','(CP+Emp)−Immo',res.frng],['BFR','Stocks+Créances−Dettes',res.bfr],['Trésorerie Nette','FRNG−BFR',res.tn]].map(([lbl,sub,n],i)=>(
              <div key={i} style={{background:'#fff',border:`${i===2?2:1}px solid ${i===2?col(n):'rgba(15,31,69,.12)'}`,borderRadius:8,padding:'.8rem',textAlign:'center'}}>
                <div style={{fontSize:'.69rem',color:'#6B7490',marginBottom:'.28rem'}}>{lbl}</div>
                <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'1.2rem',color:i===1?'#c47a1e':col(n)}}>{fmt(n)}</div>
                <div style={{fontSize:'.64rem',color:'#6B7490',marginTop:'.18rem'}}>{sub}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:'.79rem',padding:'.52rem .75rem',borderRadius:8,background:res.tn>=0?'#e4f5ec':'#fde8e7',color:col(res.tn)}}>
            {res.tn>=0 ? '✅ Trésorerie positive : le FRNG couvre le BFR.' : '⚠️ Découvert : BFR supérieur au FRNG.'}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════ QUIZ COMPONENT ═══════════ */
function QuizPanel({ chIdx, savedAnswers, onAnswer, onDone }) {
  const data = QUIZ_DATA[chIdx];
  const [answers, setAnswers] = useState(savedAnswers || {});

  const pick = (qi, oi) => {
    if (answers[qi] !== undefined) return;
    const next = { ...answers, [qi]: oi };
    setAnswers(next);
    onAnswer(next);
    if (Object.keys(next).length === data.length) onDone(next);
  };

  const score = Object.keys(answers).filter(qi => answers[qi] === data[qi].a).length;

  return (
    <div>
      {data.map((q, qi) => {
        const picked = answers[qi];
        return (
          <div key={qi} style={{marginBottom:'1.25rem',paddingBottom:'1.25rem',borderBottom: qi<data.length-1?'1px solid rgba(15,31,69,.08)':'none'}}>
            <p style={{fontSize:'.9rem',fontWeight:500,marginBottom:'.8rem',lineHeight:1.5}}>{qi+1}. {q.q}</p>
            <div style={{display:'flex',flexDirection:'column',gap:'.42rem',marginBottom:'.75rem'}}>
              {q.o.map((opt,oi) => {
                let bg='#fff', border='1.5px solid rgba(15,31,69,.12)', color='#0F1F45';
                if (picked !== undefined) {
                  if (oi === q.a) { bg='#e4f5ec'; border='1.5px solid #2d8a4e'; color='#1a5c35'; }
                  else if (oi === picked) { bg='#fde8e7'; border='1.5px solid #E03028'; color='#8a1f1f'; }
                }
                return (
                  <button key={oi} onClick={() => pick(qi,oi)} disabled={picked!==undefined}
                    style={{textAlign:'left',padding:'.62rem .85rem',borderRadius:8,border,background:bg,cursor:picked!==undefined?'default':'pointer',fontSize:'.84rem',color,transition:'all .15s',width:'100%',opacity:picked!==undefined&&oi!==q.a&&oi!==picked?.5:1}}>
                    {opt}
                  </button>
                );
              })}
            </div>
            {picked !== undefined && (
              <div style={{padding:'.62rem .85rem',borderRadius:8,fontSize:'.82rem',lineHeight:1.5,background:picked===q.a?'#e4f5ec':'#fde8e7',borderLeft:`3px solid ${picked===q.a?'#2d8a4e':'#E03028'}`,color:picked===q.a?'#1a5c35':'#8a1f1f'}}>
                {picked===q.a?'✅':'❌'} {q.e}
              </div>
            )}
          </div>
        );
      })}
      {Object.keys(answers).length === data.length && (
        <div style={{textAlign:'center',padding:'1.2rem',background:'#f9f9f9',borderRadius:8,marginTop:'.5rem'}}>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'2.4rem',color:score>=2?'#1e6e45':score===1?'#c47a1e':'#c41f1f'}}>{score}/{data.length}</div>
          <div style={{fontSize:'.84rem',color:'#6B7490',marginTop:'.2rem'}}>{Math.round(score/data.length*100)} % de bonnes réponses</div>
        </div>
      )}
    </div>
  );
}

/* ═══════════ CHAT IA ═══════════ */
const SYS_PROMPT = `Tu es un tuteur expert en comptabilité générale pour étudiants universitaires (L1/L2). Tu maîtrises : exercice comptable, partie double, bilan, compte de résultat, amortissements, stocks, affectation du résultat, CAF, FRNG, BFR. Réponds en français, de façon claire et pédagogique. Utilise des analogies concrètes. Montre les étapes pour les calculs. Sois concis (max 250 mots sauf calcul détaillé nécessaire). Encourage l'étudiant.`;

function ChatModal({ isOpen, onClose, curChapter, initialMsg }) {
  const [msgs, setMsgs] = useState([{ role:'ai', text:'Bonjour ! Je suis ton tuteur en comptabilité. Pose-moi n\'importe quelle question — j\'explique, je donne des exemples chiffrés, ou je crée un exercice supplémentaire. 📚' }]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState([]);
  const msgsRef = useRef(null);
  const inputRef = useRef(null);
  const initialMsgSent = useRef(false);

  useEffect(() => {
    if (isOpen) {
      setTimeout(() => inputRef.current?.focus(), 150);
      if (initialMsg && !initialMsgSent.current) {
        initialMsgSent.current = true;
        setInput(initialMsg);
      }
    }
  }, [isOpen, initialMsg]);

  useEffect(() => {
    if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
  }, [msgs]);

  const send = async (msgText) => {
    const txt = msgText || input.trim();
    if (!txt || loading) return;
    setInput('');
    const userMsg = { role:'user', text: txt };
    setMsgs(prev => [...prev, userMsg]);
    setLoading(true);
    const newHistory = [...history, { role:'user', content: txt }];
    setHistory(newHistory);
    const ctx = curChapter >= 0 ? `L'étudiant est sur : Chapitre ${curChapter+1} – ${CHAPTERS[curChapter].title}.` : `L'étudiant consulte la vue d'ensemble.`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:800,
          system: SYS_PROMPT + '\n\n' + ctx,
          messages: newHistory,
        }),
      });
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || 'HTTP '+res.status); }
      const data = await res.json();
      const reply = data.content?.[0]?.text || 'Pas de réponse.';
      setHistory(prev => [...prev, { role:'assistant', content: reply }]);
      setMsgs(prev => [...prev, { role:'ai', text: reply }]);
    } catch(e) {
      setMsgs(prev => [...prev, { role:'ai', text:`⚠️ **Connexion impossible.**\n\nL'IA fonctionne uniquement quand l'app est hébergée sur internet. Dépose le fichier sur **netlify.com/drop** pour activer le tuteur. (${e.message})` }]);
    }
    setLoading(false);
  };

  const qps = curChapter >= 0
    ? ['Explique ce concept simplement','Donne un exemple chiffré','Génère un exercice supplémentaire','Erreurs classiques ?']
    : ['Par où commencer ?','Explique la partie double','Différence bilan / résultat ?','Comment calculer la CAF ?'];

  const fmtText = t => t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br/>');

  if (!isOpen) return null;
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(15,31,69,.55)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center',backdropFilter:'blur(3px)'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',borderRadius:'14px 14px 0 0',width:'100%',maxWidth:660,display:'flex',flexDirection:'column',height:'82vh',maxHeight:640,animation:'slideUp .25s ease'}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'.9rem 1.1rem',borderBottom:'1px solid rgba(15,31,69,.12)',display:'flex',alignItems:'center',gap:9}}>
          <div style={{width:10,height:10,background:'#F0C040',borderRadius:'50%',animation:'pulse 2s infinite',flexShrink:0}}/>
          <h3 style={{flex:1,fontSize:'.93rem',fontWeight:700}}>Tuteur IA — Comptabilité</h3>
          <button onClick={onClose} style={{width:28,height:28,borderRadius:'50%',border:'none',background:'#F0EEE8',cursor:'pointer',fontSize:'.93rem',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        <div style={{padding:'.48rem 1.1rem',background:'#EEF2FF',fontSize:'.74rem',color:'#1A3370',borderBottom:'1px solid rgba(15,31,69,.12)'}}>
          Contexte : {curChapter >= 0 ? `Chapitre ${curChapter+1} – ${CHAPTERS[curChapter].title}` : 'Vue générale'}
        </div>
        <div ref={msgsRef} style={{flex:1,overflowY:'auto',padding:'.85rem 1.1rem',display:'flex',flexDirection:'column',gap:'.6rem'}}>
          {msgs.map((m,i) => (
            <div key={i} style={{maxWidth:'88%',fontSize:'.84rem',lineHeight:1.6,padding:'.52rem .78rem',borderRadius:m.role==='user'?'12px 12px 2px 12px':'12px 12px 12px 2px',alignSelf:m.role==='user'?'flex-end':'flex-start',background:m.role==='user'?'#0F1F45':'#F0EEE8',color:m.role==='user'?'#fff':'#0F1F45'}}>
              <span dangerouslySetInnerHTML={{__html: fmtText(m.text)}}/>
            </div>
          ))}
          {loading && <div style={{maxWidth:'88%',fontSize:'.84rem',lineHeight:1.6,padding:'.52rem .78rem',borderRadius:'12px 12px 12px 2px',alignSelf:'flex-start',background:'#F0EEE8',color:'#6B7490',fontStyle:'italic'}}>En train de réfléchir…</div>}
        </div>
        <div style={{padding:'0 1.1rem .48rem',display:'flex',gap:5,flexWrap:'wrap'}}>
          {qps.map(p=><button key={p} onClick={()=>send(p)} style={{padding:'.27rem .62rem',borderRadius:99,fontSize:'.71rem',border:'1px solid rgba(15,31,69,.12)',background:'#fff',cursor:'pointer',color:'#6B7490'}}>{p}</button>)}
        </div>
        <div style={{padding:'.62rem 1.1rem',borderTop:'1px solid rgba(15,31,69,.12)',display:'flex',gap:7}}>
          <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Ta question…"
            style={{flex:1,padding:'.52rem .75rem',border:'1.5px solid rgba(15,31,69,.12)',borderRadius:8,fontSize:'.84rem'}}/>
          <button onClick={()=>send()} disabled={loading||!input.trim()}
            style={{padding:'.52rem .85rem',background:'#E03028',border:'none',borderRadius:8,color:'#fff',fontWeight:600,cursor:'pointer',fontSize:'.84rem',opacity:loading||!input.trim()?.5:1,flexShrink:0}}>
            Envoyer
          </button>
        </div>
      </div>
    </div>
  );
}

  /* ── SIDEBAR CONTENT ── */
  const SidebarContent = () => (
    <div style={{background:'#0F1F45',display:'flex',flexDirection:'column',width:256,height:'100%',overflowY:'auto',flexShrink:0}}>
      <div style={{padding:'1.4rem 1.2rem 1rem',borderBottom:'1px solid rgba(255,255,255,.08)',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:34,height:34,background:'#E03028',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Syne,sans-serif',fontWeight:800,color:'#fff',fontSize:'.9rem',flexShrink:0}}>PC</div>
        <div>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,color:'#fff',fontSize:'.97rem',lineHeight:1.2}}>Prof Compta IA</div>
          <div style={{fontSize:'.67rem',color:'rgba(255,255,255,.4)'}}>Tuteur IA · L1/L2</div>
        </div>
      </div>
      <div style={{padding:'.85rem 1.2rem',borderBottom:'1px solid rgba(255,255,255,.06)'}}>
        <div style={{fontSize:'.67rem',color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'.4rem'}}>Progression</div>
        <div style={{background:'rgba(255,255,255,.1)',borderRadius:99,height:4}}>
          <div style={{background:'#F0C040',height:4,borderRadius:99,width:`${progPct}%`,transition:'width .5s'}}/>
        </div>
        <div style={{fontSize:'.77rem',color:'#F0C040',fontWeight:500,marginTop:'.3rem'}}>{progPct} %</div>
      </div>
      <nav style={{flex:1,padding:'.5rem .75rem'}}>
        <div style={{fontSize:'.65rem',color:'rgba(255,255,255,.3)',textTransform:'uppercase',letterSpacing:'.1em',padding:'.65rem .7rem .3rem'}}>Navigation</div>
        {[{id:'home',lbl:'Accueil',sub:'Vue d\'ensemble',num:'⌂'},...CHAPTERS.map(c=>({id:c.id,lbl:c.title,sub:c.subtitle,num:c.id+1}))].map(item=>{
          const active = item.id==='home' ? page==='home' : page==='chapter'&&curCh===item.id;
          const done = item.id!=='home' && scores[item.id]>=2;
          return (
            <button key={item.id} onClick={()=>item.id==='home'?goHome():goChapter(item.id)}
              style={{display:'flex',alignItems:'center',gap:9,padding:'.52rem .72rem',borderRadius:8,cursor:'pointer',color:active?'#fff':'rgba(255,255,255,.6)',fontSize:'.82rem',marginBottom:2,transition:'all .15s',border:'none',background:active?'rgba(255,255,255,.12)':'none',width:'100%',textAlign:'left'}}>
              <span style={{width:20,height:20,borderRadius:'50%',border:`1.5px solid ${active?'#E03028':done?'#2d8a4e':'rgba(255,255,255,.2)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.68rem',fontWeight:700,flexShrink:0,background:active?'#E03028':done?'#2d8a4e':'none',color:active||done?'#fff':'inherit'}}>
                {done?'✓':item.num}
              </span>
              <span style={{flex:1,lineHeight:1.25}}>
                {item.lbl}<span style={{fontSize:'.65rem',opacity:.5,display:'block'}}>{item.sub}</span>
              </span>
            </button>
          );
        })}
      </nav>
      <div style={{margin:'.75rem'}}>
        <button onClick={()=>openChat()} style={{width:'100%',padding:'.7rem 1rem',background:'#E03028',border:'none',borderRadius:8,color:'#fff',fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:'.82rem',cursor:'pointer',display:'flex',alignItems:'center',gap:8}}>
          <span style={{width:8,height:8,background:'#F0C040',borderRadius:'50%',animation:'pulse 2s infinite',flexShrink:0}}/>
          Tuteur IA — poser une question
        </button>
      </div>
    </div>
  );

  /* ── HOME PAGE ── */
  const HomePage = () => (
    <div className="fade-in">
      <div style={{background:'#0F1F45',padding:'2rem 1.5rem',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-50,right:-50,width:200,height:200,borderRadius:'50%',border:'32px solid rgba(255,255,255,.04)'}}/>
        <div style={{fontSize:'.7rem',color:'#F0C040',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:'.6rem'}}>Comptabilité Générale · Semestre complet</div>
        <h1 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:isMobile?'1.5rem':'1.9rem',color:'#fff',lineHeight:1.1,marginBottom:'.6rem'}}>Rattrape ton<br/><span style={{color:'#FF4D43'}}>semestre compta</span></h1>
        <p style={{color:'rgba(255,255,255,.6)',fontSize:'.88rem',lineHeight:1.6,marginBottom:'1.25rem',maxWidth:420}}>7 chapitres · explications + analogies · exercices corrigés · quiz interactifs · tuteur IA</p>
        <div style={{display:'flex',gap:'1.5rem'}}>
          {[['7','Chapitres'],['21','Quiz'],['14','Exercices']].map(([n,l])=>(
            <div key={l}><div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'1.5rem',color:'#fff'}}>{n}</div><div style={{fontSize:'.7rem',color:'rgba(255,255,255,.4)'}}>{l}</div></div>
          ))}
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'repeat(auto-fill,minmax(190px,1fr))',gap:'.85rem',padding:'1.25rem 1.5rem'}}>
        {CHAPTERS.map(ch => {
          const sc = scores[ch.id], done = sc >= 2, pct = sc!=null ? Math.round(sc/3*100) : 0;
          return (
            <div key={ch.id} onClick={()=>goChapter(ch.id)}
              style={{background:'#fff',borderRadius:12,border:`1px solid ${done?'#2d8a4e':'rgba(15,31,69,.12)'}`,padding:'1rem',cursor:'pointer',display:'flex',flexDirection:'column',gap:'.6rem',transition:'all .2s'}}>
              <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'.7rem',color:'#6B7490',letterSpacing:'.07em'}}>CHAPITRE {ch.id+1}</div>
              <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:'.92rem',lineHeight:1.2}}>{ch.title}</div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {ch.tags.map(t=><span key={t} style={{fontSize:'.64rem',padding:'.14rem .44rem',borderRadius:4,fontWeight:500,background:'#e8edf8',color:'#1A3370'}}>{t}</span>)}
              </div>
              <div style={{background:'#F0EEE8',borderRadius:99,height:3}}><div style={{background:'#E03028',height:3,borderRadius:99,width:`${pct}%`,transition:'width .4s'}}/></div>
              <div style={{fontSize:'.71rem',color:done?'#2d8a4e':'#6B7490'}}>{sc==null?'· Non commencé':done?'✓ Maîtrisé':`· ${sc}/3 au quiz`}</div>
            </div>
          );
        })}
      </div>
    </div>
  );

  /* ── CHAPTER PAGE ── */
  const ChapterPage = () => {
    const ch = CHAPTERS[curCh];
    const stepContent = () => {
      if (curStep === 1 && (curCh === 3 || curCh === 6)) {
        return (
          <div style={S.card}>
            <h3 style={{fontSize:'.95rem',fontWeight:700,marginBottom:'.7rem'}}>🧮 Calculateur {curCh===3?"d'amortissement":"FRNG / BFR / Trésorerie"}</h3>
            {curCh===3 ? <AmortCalc/> : <FRNGCalc/>}
          </div>
        );
      }
      if (curStep === 0) return (
        <div style={S.card}>
          <h3 style={{fontSize:'.95rem',fontWeight:700,marginBottom:'.7rem'}}>📖 Concept</h3>
          <Html html={CONCEPTS_HTML[curCh]}/>
        </div>
      );
      if (curStep === 1) {
        const an = ANALOGIES[curCh];
        return (
          <div style={S.card}>
            <h3 style={{fontSize:'.95rem',fontWeight:700,marginBottom:'.7rem'}}>💡 Analogie — {an?.title}</h3>
            <div style={{background:'#FFF3E0',borderLeft:'3px solid #E03028',borderRadius:'0 8px 8px 0',padding:'.9rem',fontSize:'.88rem',lineHeight:1.65}}>
              <div style={{fontSize:'.67rem',fontWeight:700,color:'#E03028',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'.35rem'}}>Analogie</div>
              <Html html={an?.body||''}/>
            </div>
          </div>
        );
      }
      if (curStep === 2) {
        const ex = EXERCISES[curCh];
        const corrKey = `ch${curCh}`;
        return (
          <div style={S.card}>
            <h3 style={{fontSize:'.95rem',fontWeight:700,marginBottom:'.7rem'}}>✏️ Exercice</h3>
            <p style={{fontSize:'.88rem',lineHeight:1.6,marginBottom:'.75rem'}}>{ex.instr}</p>
            <div style={{background:'#F0EEE8',borderRadius:8,padding:'.8rem',fontSize:'.84rem',lineHeight:1.8,marginBottom:'.8rem'}}>
              {ex.data.split('\n').map((l,i)=><span key={i}>{l}<br/></span>)}
            </div>
            <textarea value={answer[corrKey]||''} onChange={e=>setAnswer(p=>({...p,[corrKey]:e.target.value}))}
              placeholder="Écris ta réponse ici…"
              style={{width:'100%',minHeight:82,padding:'.62rem',border:'1.5px solid rgba(15,31,69,.12)',borderRadius:8,fontSize:'.84rem',lineHeight:1.5,resize:'vertical'}}/>
            <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:'.75rem'}}>
              <Btn variant="danger" size="sm" onClick={()=>setShowCorr(p=>({...p,[corrKey]:!p[corrKey]}))}>
                {showCorr[corrKey]?'Masquer la correction':'Voir la correction'}
              </Btn>
              <Btn variant="outline" size="sm" onClick={()=>openChat(`Aide-moi avec l'exercice du chapitre ${curCh+1} : ${ex.instr}`)}>
                Aide du tuteur IA ↗
              </Btn>
            </div>
            {showCorr[corrKey] && (
              <div style={{background:'#E4F5EC',border:'1px solid #a5d9b8',borderRadius:8,padding:'1rem',marginTop:'.75rem',fontSize:'.84rem',lineHeight:1.7}}>
                <h4 style={{color:'#1a5c35',fontFamily:'Syne,sans-serif',fontSize:'.87rem',marginBottom:'.65rem'}}>✅ Correction</h4>
                <Html html={ex.corr}/>
              </div>
            )}
          </div>
        );
      }
      if (curStep === 3) {
        return (
          <div style={S.card}>
            <h3 style={{fontSize:'.95rem',fontWeight:700,marginBottom:'1rem'}}>🎯 Quiz — Chapitre {curCh+1}</h3>
            <QuizPanel
              chIdx={curCh}
              savedAnswers={quizAnswers[curCh]}
              onAnswer={ans=>setQuizAnswers(p=>({...p,[curCh]:ans}))}
              onDone={ans=>{
                const sc = Object.keys(ans).filter(qi=>ans[qi]===QUIZ_DATA[curCh][qi].a).length;
                setScores(p=>({...p,[curCh]:sc}));
              }}
            />
          </div>
        );
      }
    };

    return (
      <div className="fade-in" style={{minHeight:'100%'}}>
        <div style={{padding:'1.1rem 1.4rem 1rem',borderBottom:'1px solid rgba(15,31,69,.12)',background:'#fff',position:'sticky',top:0,zIndex:5}}>
          <span onClick={goHome} style={{fontSize:'.75rem',color:'#6B7490',cursor:'pointer',marginBottom:'.35rem',display:'inline-block'}}>← Accueil</span>
          <h2 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:isMobile?'1.05rem':'1.2rem',lineHeight:1.2}}>{`Ch.${curCh+1} · ${ch.title}`}</h2>
          <p style={{fontSize:'.84rem',color:'#6B7490',marginTop:'.28rem'}}>{ch.desc||ch.subtitle}</p>
          <div style={{display:'flex',gap:4,marginTop:'.8rem',flexWrap:'wrap'}}>
            {ch.steps.map((s,i)=>{
              const active = i===curStep, done = i<curStep;
              return (
                <button key={i} onClick={()=>goStep(i)}
                  style={{padding:'.33rem .82rem',borderRadius:99,fontSize:'.77rem',fontWeight:500,border:`1.5px solid ${active?'#0F1F45':done?'#a5d9b8':'rgba(15,31,69,.15)'}`,background:active?'#0F1F45':done?'#e4f5ec':'#fff',cursor:'pointer',color:active?'#fff':done?'#1a5c35':'#6B7490',transition:'all .15s'}}>
                  {i+1}. {s}
                </button>
              );
            })}
          </div>
        </div>
        <div style={{padding:'1.1rem 1.4rem',maxWidth:840}}>
          {stepContent()}
          <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:'.5rem',paddingBottom:'2rem'}}>
            {curStep > 0 && <Btn variant="outline" size="sm" onClick={()=>goStep(curStep-1)}>← Retour</Btn>}
            {curStep < ch.steps.length-1 && <Btn onClick={()=>goStep(curStep+1)}>Suivant →</Btn>}
            {curStep === ch.steps.length-1 && curCh < 6 && <Btn onClick={()=>goChapter(curCh+1)}>Chapitre suivant →</Btn>}
            {curStep === ch.steps.length-1 && curCh === 6 && <Btn onClick={goHome}>Tableau de bord →</Btn>}
          </div>
        </div>
      </div>
    );
  };

  /* ── RENDER ── */
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',flexDirection:'column'}}>
      {/* Mobile Header */}
      {isMobile && (
        <header style={{background:'#0F1F45',padding:'.8rem 1rem',display:'flex',alignItems:'center',gap:10,flexShrink:0,zIndex:60}}>
          <button onClick={()=>setSidebarOpen(true)} style={{width:36,height:36,borderRadius:8,border:'none',background:'rgba(255,255,255,.12)',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem'}}>☰</button>
          <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,color:'#fff',fontSize:'.95rem',flex:1}}>Prof Compta IA</div>
          <button onClick={()=>openChat()} style={{width:36,height:36,borderRadius:8,border:'none',background:'#E03028',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem'}}>💬</button>
        </header>
      )}

      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {/* Desktop Sidebar */}
        {!isMobile && <SidebarContent/>}

        {/* Mobile Sidebar Overlay */}
        {isMobile && sidebarOpen && (
          <>
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:99}} onClick={()=>setSidebarOpen(false)}/>
            <div style={{position:'fixed',top:0,left:0,bottom:0,zIndex:100,display:'flex'}}>
              <SidebarContent/>
            </div>
          </>
        )}

        {/* Main Content */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {!isMobile && (
            <div style={{background:'#fff',borderBottom:'1px solid rgba(15,31,69,.12)',padding:'.7rem 1.4rem',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
              <div style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:'.95rem',flex:1}}>
                {page==='home' ? 'Accueil' : curCh>=0 ? CHAPTERS[curCh].title : ''}
              </div>
              {page==='chapter' && curCh>=0 && (
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                  {CHAPTERS[curCh].tags.map(t=><span key={t} style={{padding:'.2rem .6rem',borderRadius:99,fontSize:'.7rem',fontWeight:500,background:'#F0EEE8',color:'#6B7490',border:'1px solid rgba(15,31,69,.1)'}}>{t}</span>)}
                </div>
              )}
            </div>
          )}
          <div ref={bodyRef} style={{flex:1,overflowY:'auto'}}>
            {page==='home' ? <HomePage/> : <ChapterPage/>}
          </div>
        </div>
      </div>

      <ChatModal isOpen={chatOpen} onClose={()=>setChatOpen(false)} curChapter={curCh} initialMsg={chatMsg}/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
